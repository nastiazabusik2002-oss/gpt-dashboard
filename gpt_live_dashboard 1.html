<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT Live — Аналітика агентів</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a0a2e;--surface:#220d3a;--card:#2d1050;--card2:#3a1260;
    --border:#5a2d8a44;--border2:#c06bb044;
    --pink:#f472b6;--pink-dim:#f472b622;--purple:#a855f7;--purple-dim:#a855f722;
    --lavender:#c084fc;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;
    --text:#f0e6ff;--muted:#9d7fc0;
    --font-main:'Unbounded',sans-serif;--font-mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--font-main);min-height:100vh;padding:28px 20px 60px;overflow-x:hidden}
  body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
    background:radial-gradient(ellipse at 15% 10%,#a855f714 0%,transparent 50%),
               radial-gradient(ellipse at 85% 85%,#f472b610 0%,transparent 50%);
    pointer-events:none;z-index:0}
  .container{position:relative;z-index:1;max-width:1300px;margin:0 auto}
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
  h1{font-size:clamp(1.2rem,3vw,2rem);font-weight:800;letter-spacing:-0.03em;
    background:linear-gradient(135deg,#f472b6,#a855f7,#c084fc);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subtitle{font-family:var(--font-mono);font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:6px}
  .live-badge{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.6rem;color:var(--green);
    background:#14532d33;border:1px solid #4ade8033;padding:6px 12px;border-radius:20px}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px}
  .spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-family:var(--font-mono);font-size:.7rem;color:var(--muted)}
  .error-box{background:#7f1d1d33;border:1px solid #f8717144;border-radius:12px;padding:24px}
  .error-box h3{color:var(--red);font-size:.9rem;margin-bottom:8px;text-align:center}
  .error-box p{font-family:var(--font-mono);font-size:.62rem;color:var(--muted);line-height:1.8;text-align:center}
  code{color:var(--pink);background:var(--pink-dim);padding:2px 6px;border-radius:3px}
  .tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .tab{font-family:var(--font-mono);font-size:.65rem;padding:9px 16px;border:none;background:transparent;
    color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
    transition:all .2s;text-transform:uppercase;letter-spacing:.07em;border-radius:4px 4px 0 0}
  .tab:hover{color:var(--pink)}.tab.active{color:var(--pink);border-bottom-color:var(--pink);background:var(--pink-dim)}
  .month-selector{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  .month-btn{font-family:var(--font-mono);font-size:.58rem;padding:5px 11px;border:1px solid var(--border);
    background:transparent;color:var(--muted);border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .month-btn:hover{border-color:var(--purple);color:var(--purple)}
  .month-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
  .sel-label{font-family:var(--font-mono);font-size:.58rem;color:var(--muted);text-transform:uppercase}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
  .kpi{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border2);
    border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;animation:fadeUp .4s ease both}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--purple))}
  .kpi-icon{font-size:1.1rem;margin-bottom:6px}
  .kpi-label{font-family:var(--font-mono);font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
  .kpi-value{font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;
    background:linear-gradient(135deg,var(--pink),var(--lavender));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .kpi-sub{font-family:var(--font-mono);font-size:.55rem;color:var(--muted);margin-top:4px}
  .controls{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .ctrl-label{font-family:var(--font-mono);font-size:.58rem;color:var(--muted);text-transform:uppercase}
  .sort-btn{font-family:var(--font-mono);font-size:.58rem;padding:5px 10px;border:1px solid var(--border);
    background:transparent;color:var(--muted);border-radius:5px;cursor:pointer;transition:all .2s}
  .sort-btn:hover{border-color:var(--pink);color:var(--pink)}
  .sort-btn.active{background:linear-gradient(135deg,var(--pink),var(--purple));border-color:transparent;color:#fff;font-weight:600}
  .agents-list{display:flex;flex-direction:column;gap:7px}
  .agent-card{background:linear-gradient(135deg,var(--card),#2a0d48);border:1px solid var(--border2);
    border-radius:11px;padding:13px 16px;display:grid;grid-template-columns:38px 1fr auto;
    align-items:center;gap:12px;cursor:pointer;
    transition:border-color .2s,transform .15s,box-shadow .2s;animation:fadeUp .4s ease both}
  .agent-card:hover{border-color:var(--pink);transform:translateX(4px);box-shadow:-3px 0 16px var(--pink-dim)}
  .rank{font-family:var(--font-mono);font-size:.7rem;color:var(--muted);text-align:center;font-weight:600}
  .agent-name{font-size:.75rem;font-weight:600;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .agent-tags{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap}
  .tag{font-family:var(--font-mono);font-size:.5rem;padding:2px 7px;border-radius:10px;font-weight:600}
  .tag-new{background:#14532d44;color:var(--green);border:1px solid #4ade8033}
  .tag-gone{background:#7f1d1d44;color:var(--red);border:1px solid #f8717133}
  .tag-up{background:#14532d33;color:var(--green)}
  .tag-down{background:#7f1d1d33;color:var(--red)}
  .tag-stable{background:var(--purple-dim);color:var(--lavender)}
  .bar-row{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .bar-label{font-family:var(--font-mono);font-size:.52rem;color:var(--muted);width:40px;flex-shrink:0}
  .bar-track{flex:1;height:4px;background:#3a1260;border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
  .bar-val{font-family:var(--font-mono);font-size:.55rem;color:var(--text);width:34px;text-align:right;flex-shrink:0}
  .agent-stats{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .total-num{font-family:var(--font-mono);font-size:1rem;font-weight:700;
    background:linear-gradient(135deg,#f472b6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .avg-pill{font-family:var(--font-mono);font-size:.55rem;padding:2px 7px;border-radius:4px;
    background:var(--pink-dim);color:var(--pink);border:1px solid var(--pink-dim)}
  .norm-pill{font-family:var(--font-mono);font-size:.55rem;padding:2px 7px;border-radius:4px;
    background:var(--purple-dim);color:var(--lavender);border:1px solid var(--purple-dim)}
  .agent-detail{display:none;background:#1e0a36;border:1px solid var(--border2);border-top:none;
    border-radius:0 0 11px 11px;padding:14px 16px 14px 66px;margin-top:-7px}
  .agent-detail.open{display:block;animation:fadeUp .2s ease}
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:12px}
  .dl{font-family:var(--font-mono);font-size:.52rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
  .dv{font-family:var(--font-mono);font-size:.9rem;font-weight:600;color:var(--lavender)}
  .analysis-box{background:linear-gradient(135deg,#1e0a36,#2a0d48);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-top:10px}
  .analysis-title{font-family:var(--font-mono);font-size:.58rem;color:var(--pink);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
  .analysis-text{font-family:var(--font-mono);font-size:.62rem;color:var(--text);line-height:1.7}
  .analysis-text .good{color:var(--green)}.analysis-text .bad{color:var(--red)}.analysis-text .warn{color:var(--yellow)}
  .insight-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
  .insight-card{background:linear-gradient(135deg,var(--card),#2a0d48);border:1px solid var(--border2);
    border-radius:12px;padding:16px 18px;animation:fadeUp .5s ease both}
  .insight-icon{font-size:1.4rem;margin-bottom:8px}
  .insight-title{font-size:.7rem;font-weight:700;color:var(--lavender);margin-bottom:8px}
  .insight-body{font-family:var(--font-mono);font-size:.6rem;color:var(--muted);line-height:1.7}
  .insight-body strong{color:var(--text)}.insight-body .g{color:var(--green);font-weight:600}
  .insight-body .r{color:var(--red);font-weight:600}.insight-body .y{color:var(--yellow);font-weight:600}
  .compare-card{background:linear-gradient(135deg,var(--card),#2a0d48);border:1px solid var(--border2);
    border-radius:11px;padding:13px 16px;display:grid;grid-template-columns:32px 1fr auto;
    align-items:center;gap:12px;animation:fadeUp .4s ease both}
  .refresh-btn{font-family:var(--font-mono);font-size:.6rem;padding:7px 14px;border:1px solid var(--border2);
    background:transparent;color:var(--lavender);border-radius:8px;cursor:pointer;transition:all .2s}
  .refresh-btn:hover{background:var(--purple-dim);border-color:var(--purple)}
  .tip{font-family:var(--font-mono);font-size:.58rem;color:var(--muted);margin-bottom:14px}
  .tip span{color:var(--pink)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>✈️ GPT Live Аналітика</h1>
      <div class="subtitle">OTA · Ефективність агентів · Сезонний аналіз</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="live-badge"><div class="live-dot"></div>LIVE — Google Sheets</div>
      <button class="refresh-btn" onclick="loadData()">🔄 Оновити</button>
    </div>
  </header>
  <div id="mainContent">
    <div class="loading"><div class="spinner"></div><div class="loading-text">Завантажую дані...</div></div>
  </div>
</div>

<script>
// Use PUBLISHED ID from "Файл → Опублікувати в інтернеті"
const PUB_ID = '2PACX-1vQQzHE9M5eVJy5m0RvwJzxPWCFiX4qImpV6Zh-Mxxw8PE9_RuIGNkQNQf6ghCsExJ-Y1XFEJ6irAqwW';

const SEASON = {
  'січень':0.75,'лютий':0.80,'березень':0.95,'квітень':1.05,'травень':1.15,'червень':1.35,
  'липень':1.45,'серпень':1.40,'вересень':1.10,'жовтень':0.95,'листопад':0.80,'грудень':0.85,
  'january':0.75,'february':0.80,'march':0.95,'april':1.05,'may':1.15,'june':1.35,
  'july':1.45,'august':1.40,'september':1.10,'october':0.95,'november':0.80,'december':0.85,
};

let allSheets={}, monthNames=[], currentTab='agents', currentMonth=null, sortKey='total';

function getSeasonIdx(name){
  const low=(name||'').toLowerCase();
  for(const[k,v] of Object.entries(SEASON)) if(low.includes(k)) return v;
  return 1.0;
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2) return [];
  const parseRow=line=>{
    const cells=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    cells.push(cur.trim());
    return cells;
  };
  const headers=parseRow(lines[0]);
  return lines.slice(1).map(l=>{
    const cells=parseRow(l);
    const obj={};
    headers.forEach((h,i)=>obj[h]=cells[i]||'');
    return obj;
  });
}

function parseAgents(rows){
  if(!rows||rows.length===0) return [];
  const agents=[];
  const headers=Object.keys(rows[0]||{});
  const findCol=kws=>{for(const kw of kws){const h=headers.find(h=>h.toLowerCase().includes(kw));if(h)return h;}return null;};
  const colName=findCol(['агент','agent','імя','name','ім\'я']);
  const colClosed=findCol(['закрит','closed']);
  const colLetters=findCol(['лист','letter']);
  const colChats=findCol(['чат','chat']);
  const colChanges=findCol(['к-сть змін','зміни','зміна']);
  const colChatChanges=findCol(['к-сть змін чат','зміни чат']);
  const colAvgPerChange=findCol(['ср.чат','ср. чат','avgper']);
  const colAvg=findCol(['ср. закрит','ср.закрит','avg закрит','середн']);
  const colTotal=findCol(['total','тотал','всього']);

  for(const row of rows){
    let name=colName?row[colName]:'';
    if(!name){
      for(const h of headers){
        const v=String(row[h]||'').trim();
        if(v&&isNaN(Number(v.replace(',','.').replace(' ','')))&&v.length>2&&!/^\d/.test(v)){name=v;break;}
      }
    }
    name=String(name).trim().replace(/[🔴🟡🟢✅❌⭐🌟]/g,'').trim();
    const skip=['разом','total','агент','agent','ім','name','підсумок','suma','итого',''];
    if(!name||skip.some(s=>name.toLowerCase().includes(s))) continue;
    if(/^\d/.test(name)) continue;

    const n=col=>{if(!col)return null;const v=parseFloat(String(row[col]||'').replace(',','.').replace(/\s/g,''));return isNaN(v)?null:v;};
    const vals=headers.map(h=>parseFloat(String(row[h]||'').replace(',','.').replace(/\s/g,''))).filter(v=>!isNaN(v));
    const pos=i=>vals[i]??null;

    const closed=n(colClosed)??pos(0);
    const letters=n(colLetters)??pos(1);
    const chats=n(colChats)??pos(2);
    const chatChanges=n(colChatChanges)??pos(3);
    const avgPerChange=n(colAvgPerChange)??pos(4);
    const changes=n(colChanges)??pos(5);
    const avgClosed=n(colAvg)??pos(7);
    const total=n(colTotal)??(closed!==null&&letters!==null&&chats!==null?(closed||0)+(letters||0)+(chats||0):pos(6));

    if(total===null&&chats===null&&letters===null) continue;
    agents.push({name,closed,letters,chats,chatChanges,avgPerChange,changes,avgClosed,total});
  }
  return agents;
}

async function loadData(){
  showLoading();
  allSheets={};monthNames=[];

  // Fetch all sheets using published CSV URL with gid parameter
  // Try gids 0-15
  const promises=[];
  for(let gid=0;gid<=15;gid++) promises.push(fetchSheetCSV(gid));
  const results=await Promise.allSettled(promises);

  for(const r of results){
    if(r.status==='fulfilled'&&r.value){
      const{name,agents}=r.value;
      if(agents.length>0&&!monthNames.includes(name)){
        allSheets[name]=agents;
        monthNames.push(name);
      }
    }
  }

  if(monthNames.length===0){showError();return;}
  currentMonth=monthNames[monthNames.length-1];
  renderAll();
}

async function fetchSheetCSV(gid){
  // Published spreadsheet CSV export URL
  const url=`https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?output=csv&gid=${gid}`;
  try{
    const res=await fetch(url,{cache:'no-cache'});
    if(!res.ok) return null;
    const text=await res.text();
    if(!text||text.includes('<!DOCTYPE')||text.length<30) return null;

    const rows=parseCSV(text);
    const agents=parseAgents(rows);
    if(agents.length===0) return null;

    // Try to extract sheet name from first non-agent row or use position
    // Check if there's a title row (merged cell with sheet name like "GPT")
    let sheetName=`Місяць ${gid+1}`;
    // Look for a row with a single non-empty value that could be a title
    for(const row of rows.slice(0,5)){
      const vals=Object.values(row).map(v=>String(v).trim()).filter(v=>v);
      if(vals.length===1&&vals[0].length>1&&vals[0].length<30&&isNaN(Number(vals[0]))){
        sheetName=vals[0];break;
      }
    }
    return{name:sheetName,agents};
  }catch(e){return null;}
}

function buildTrends(){
  const hist={};
  for(const month of monthNames){
    const sidx=getSeasonIdx(month);
    for(const a of (allSheets[month]||[])){
      if(!hist[a.name]) hist[a.name]=[];
      hist[a.name].push({...a,month,normalizedTotal:a.total?Math.round(a.total/sidx):null});
    }
  }
  return hist;
}

function analyzeTrend(history){
  if(history.length<2) return{trend:'new',label:'🆕 Новий',color:'green'};
  const last=history[history.length-1],prev=history[history.length-2];
  const n=last.normalizedTotal||last.total||0,p=prev.normalizedTotal||prev.total||0;
  if(!p) return{trend:'stable',label:'— Стабільний',color:'stable'};
  const pct=((n-p)/p)*100;
  if(pct>=10) return{trend:'up',label:`📈 +${pct.toFixed(0)}% ефективність`,color:'green'};
  if(pct<=-10) return{trend:'down',label:`📉 ${pct.toFixed(0)}% ефективність`,color:'red'};
  return{trend:'stable',label:'📊 Стабільний',color:'stable'};
}

function insightText(name,history,trend){
  if(!history.length) return '';
  const last=history[history.length-1];
  const sidx=getSeasonIdx(last.month);
  const sl=sidx>=1.2?'високий сезон':sidx<=0.85?'низький сезон':'середній сезон';
  let lines=[`<span class="${trend.color==='green'?'good':trend.color==='red'?'bad':''}">${trend.label}</span>`];
  if(history.length>=2){
    const prev=history[history.length-2];
    const rp=prev.total?((last.total-prev.total)/prev.total*100).toFixed(0):null;
    const np=prev.normalizedTotal&&last.normalizedTotal?((last.normalizedTotal-prev.normalizedTotal)/prev.normalizedTotal*100).toFixed(0):rp;
    if(rp!==null&&np!==null&&Math.abs(Number(rp)-Number(np))>8)
      lines.push(`Сирий: <span class="${Number(rp)>=0?'good':'bad'}">${Number(rp)>0?'+':''}${rp}%</span> → з урахуванням сезону (${sl}): <span class="${Number(np)>=0?'good':'bad'}">${Number(np)>0?'+':''}${np}%</span>`);
  }
  if(last.avgClosed) lines.push(`Ср. закрито: <span class="good">${last.avgClosed}</span>`);
  lines.push(`Активний: <span>${history.length}</span> міс.`);
  return lines.join('<br>');
}

function renderAll(){
  document.getElementById('mainContent').innerHTML=`
    <div class="tabs">
      <button class="tab active" onclick="switchTab('agents',this)">👤 Агенти</button>
      <button class="tab" onclick="switchTab('insights',this)">🧠 Аналітика</button>
      <button class="tab" onclick="switchTab('compare',this)">📊 Порівняння</button>
    </div>
    <div id="tabContent"></div>`;
  renderAgentsTab();
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(tab==='agents') renderAgentsTab();
  else if(tab==='insights') renderInsightsTab();
  else renderCompareTab();
}

function monthBtns(){
  return monthNames.map(m=>`<button class="month-btn${m===currentMonth?' active':''}" onclick="selMonth('${m}',this)">${m}</button>`).join('');
}

function renderAgentsTab(){
  const hist=buildTrends();
  const agents=allSheets[currentMonth]||[];
  const sidx=getSeasonIdx(currentMonth);
  const tTotal=agents.reduce((s,a)=>s+(a.total||0),0);
  const tChats=agents.reduce((s,a)=>s+(a.chats||0),0);
  const tLetters=agents.reduce((s,a)=>s+(a.letters||0),0);
  const validAvg=agents.filter(a=>a.avgClosed);
  const bestAvg=validAvg.length?validAvg.reduce((b,a)=>a.avgClosed>b.avgClosed?a:b):null;
  const newA=agents.filter(a=>hist[a.name]?.length===1).map(a=>a.name);
  const prevM=monthNames[monthNames.indexOf(currentMonth)-1];
  const goneA=prevM?(allSheets[prevM]||[]).filter(a=>!agents.find(x=>x.name===a.name)).map(a=>a.name):[];

  document.getElementById('tabContent').innerHTML=`
    <div class="month-selector"><span class="sel-label">Місяць:</span>${monthBtns()}</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-icon">📊</div><div class="kpi-label">Total</div><div class="kpi-value">${tTotal.toLocaleString()}</div><div class="kpi-sub">${agents.length} агентів</div></div>
      <div class="kpi"><div class="kpi-icon">💬</div><div class="kpi-label">Чатів</div><div class="kpi-value">${tChats.toLocaleString()}</div><div class="kpi-sub">всі агенти</div></div>
      <div class="kpi"><div class="kpi-icon">📩</div><div class="kpi-label">Листів</div><div class="kpi-value">${tLetters.toLocaleString()}</div><div class="kpi-sub">всі агенти</div></div>
      <div class="kpi"><div class="kpi-icon">✈️</div><div class="kpi-label">Сезон. індекс</div><div class="kpi-value">${sidx.toFixed(2)}x</div><div class="kpi-sub">${sidx>=1.2?'Високий сезон':sidx<=0.85?'Низький сезон':'Середній сезон'}</div></div>
      ${bestAvg?`<div class="kpi"><div class="kpi-icon">🏆</div><div class="kpi-label">Кращий avg</div><div class="kpi-value">${bestAvg.avgClosed}</div><div class="kpi-sub">${bestAvg.name.split(' ')[0]}</div></div>`:''}
    </div>
    ${newA.length?`<div style="font-family:var(--font-mono);font-size:.6rem;color:var(--green);margin-bottom:8px">🆕 Нові цього місяця: ${newA.join(', ')}</div>`:''}
    ${goneA.length?`<div style="font-family:var(--font-mono);font-size:.6rem;color:var(--red);margin-bottom:8px">👋 Відсутні порівняно з попереднім місяцем: ${goneA.join(', ')}</div>`:''}
    <div class="controls">
      <span class="ctrl-label">Сортувати:</span>
      <button class="sort-btn${sortKey==='total'?' active':''}" onclick="resort('total',this)">Total</button>
      <button class="sort-btn${sortKey==='chats'?' active':''}" onclick="resort('chats',this)">Чати</button>
      <button class="sort-btn${sortKey==='letters'?' active':''}" onclick="resort('letters',this)">Листи</button>
      <button class="sort-btn${sortKey==='avgClosed'?' active':''}" onclick="resort('avgClosed',this)">Ср. закрито</button>
      <button class="sort-btn${sortKey==='norm'?' active':''}" onclick="resort('norm',this)">🌡️ Норм. ефект.</button>
    </div>
    <div class="tip">💡 Натисни на картку для деталей · <span>🌡️ Норм.</span> = результат з урахуванням сезону</div>
    <div class="agents-list" id="agentsList"></div>`;
  renderList(agents,hist,sidx);
}

function renderList(agents,hist,sidx){
  const maxC=Math.max(...agents.map(a=>a.chats||0),1);
  const maxL=Math.max(...agents.map(a=>a.letters||0),1);
  const sv=a=>{
    if(sortKey==='chats') return a.chats||0;
    if(sortKey==='letters') return a.letters||0;
    if(sortKey==='avgClosed') return a.avgClosed||0;
    if(sortKey==='norm') return a.total?a.total/sidx:0;
    return a.total||0;
  };
  const sorted=[...agents].sort((a,b)=>sv(b)-sv(a));
  const list=document.getElementById('agentsList');
  list.innerHTML='';
  sorted.forEach((a,i)=>{
    const history=hist[a.name]||[];
    const trend=analyzeTrend(history);
    const normVal=a.total?Math.round(a.total/sidx):null;
    const ins=insightText(a.name,history,trend);
    const rank=i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
    const wrap=document.createElement('div');
    const card=document.createElement('div');
    card.className='agent-card';
    card.style.animationDelay=(i*.03).toFixed(2)+'s';
    card.innerHTML=`
      <div class="rank">${rank}</div>
      <div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-tags">
          ${history.length===1?'<span class="tag tag-new">🆕 Новий</span>':''}
          ${trend.trend==='up'?'<span class="tag tag-up">📈 Зростає</span>':''}
          ${trend.trend==='down'?'<span class="tag tag-down">📉 Падіння</span>':''}
          ${trend.trend==='stable'&&history.length!==1?'<span class="tag tag-stable">📊 Стабільний</span>':''}
        </div>
        <div class="bar-row">
          <div class="bar-label">Чати</div>
          <div class="bar-track"><div class="bar-fill" style="width:${((a.chats||0)/maxC*100).toFixed(1)}%;background:linear-gradient(90deg,#a855f7,#c084fc)"></div></div>
          <div class="bar-val">${a.chats??'—'}</div>
        </div>
        <div class="bar-row">
          <div class="bar-label">Листи</div>
          <div class="bar-track"><div class="bar-fill" style="width:${((a.letters||0)/maxL*100).toFixed(1)}%;background:linear-gradient(90deg,#f472b6,#fb7185)"></div></div>
          <div class="bar-val">${a.letters??'—'}</div>
        </div>
      </div>
      <div class="agent-stats">
        <div class="total-num">${a.total??'—'}</div>
        ${a.avgClosed?`<div class="avg-pill">avg ${a.avgClosed}</div>`:''}
        ${normVal?`<div class="norm-pill">🌡️ ${normVal}</div>`:''}
      </div>`;
    const det=document.createElement('div');
    det.className='agent-detail';
    det.innerHTML=`
      <div class="detail-grid">
        <div><div class="dl">Чатів</div><div class="dv">${a.chats??'—'}</div></div>
        <div><div class="dl">Листи</div><div class="dv">${a.letters??'—'}</div></div>
        <div><div class="dl">Закриті</div><div class="dv">${a.closed??'—'}</div></div>
        <div><div class="dl">К-сть змін</div><div class="dv">${a.changes??'—'}</div></div>
        <div><div class="dl">Змін чатів</div><div class="dv">${a.chatChanges??'—'}</div></div>
        <div><div class="dl">Ср./зміна</div><div class="dv">${a.avgPerChange??'—'}</div></div>
        <div><div class="dl">Ср. закрито</div><div class="dv">${a.avgClosed??'—'}</div></div>
        <div><div class="dl">Total</div><div class="dv" style="color:var(--pink)">${a.total??'—'}</div></div>
        <div><div class="dl">🌡️ Норм.</div><div class="dv" style="color:var(--lavender)">${normVal??'—'}</div></div>
        <div><div class="dl">Місяців</div><div class="dv">${history.length}</div></div>
      </div>
      ${ins?`<div class="analysis-box"><div class="analysis-title">🔍 Аналіз агента</div><div class="analysis-text">${ins}</div></div>`:''}`;
    card.onclick=()=>{
      const open=det.classList.contains('open');
      document.querySelectorAll('.agent-detail').forEach(e=>e.classList.remove('open'));
      if(!open) det.classList.add('open');
    };
    wrap.appendChild(card);wrap.appendChild(det);list.appendChild(wrap);
  });
}

function renderInsightsTab(){
  const hist=buildTrends();
  const agents=allSheets[currentMonth]||[];
  const sidx=getSeasonIdx(currentMonth);
  const currNames=agents.map(a=>a.name);
  const prevM=monthNames[monthNames.indexOf(currentMonth)-1];
  const prevNames=prevM?(allSheets[prevM]||[]).map(a=>a.name):[];
  const rising=[],falling=[],stable=[],newA=[],gone=[];
  for(const[name,history] of Object.entries(hist)){
    if(!currNames.includes(name)){if(prevNames.includes(name))gone.push(name);continue;}
    const trend=analyzeTrend(history);
    if(history.length===1) newA.push(name);
    else if(trend.trend==='up') rising.push({name,trend,history});
    else if(trend.trend==='down') falling.push({name,trend,history});
    else stable.push(name);
  }
  const groupTotals=monthNames.map(m=>{
    const ag=allSheets[m]||[];
    const raw=ag.reduce((s,a)=>s+(a.total||0),0);
    return{month:m,raw,norm:Math.round(raw/getSeasonIdx(m)),count:ag.length};
  });
  const pctStr=(h)=>{
    if(h.length<2) return '';
    const l=h[h.length-1],p=h[h.length-2];
    const lv=l.normalizedTotal||l.total||0,pv=p.normalizedTotal||p.total||0;
    if(!pv) return '';
    const pc=((lv-pv)/pv*100).toFixed(0);
    return `${Number(pc)>0?'+':''}${pc}%`;
  };
  document.getElementById('tabContent').innerHTML=`
    <div class="month-selector" style="margin-bottom:20px"><span class="sel-label">Аналіз станом на:</span>${monthBtns()}</div>
    <div class="insight-cards">
      ${rising.length?`<div class="insight-card" style="animation-delay:0s">
        <div class="insight-icon">📈</div><div class="insight-title">Агенти що покращились</div>
        <div class="insight-body">${rising.map(r=>`<strong>${r.name}</strong> — <span class="g">${pctStr(r.history)} ефект.</span>`).join('<br>')}</div>
      </div>`:''}
      ${falling.length?`<div class="insight-card" style="animation-delay:.1s">
        <div class="insight-icon">📉</div><div class="insight-title">Падіння ефективності</div>
        <div class="insight-body">${falling.map(r=>{
          const h=r.history,l=h[h.length-1],p=h[h.length-2];
          const rPct=p.total?((l.total-p.total)/p.total*100).toFixed(0):0;
          const nPct=p.normalizedTotal&&l.normalizedTotal?((l.normalizedTotal-p.normalizedTotal)/p.normalizedTotal*100).toFixed(0):rPct;
          const isSeason=Math.abs(Number(rPct))>8&&Math.abs(Number(nPct))<8;
          return `<strong>${r.name}</strong> — <span class="r">${nPct}%</span>${isSeason?' <span class="y">⚠️ сезонний спад, не погіршення</span>':''}`;
        }).join('<br>')}</div>
      </div>`:''}
      ${newA.length?`<div class="insight-card" style="animation-delay:.2s">
        <div class="insight-icon">🆕</div><div class="insight-title">Нові агенти</div>
        <div class="insight-body">${newA.map(n=>`<strong>${n}</strong> — перший місяць`).join('<br>')}</div>
      </div>`:''}
      ${gone.length?`<div class="insight-card" style="animation-delay:.3s">
        <div class="insight-icon">👋</div><div class="insight-title">Відсутні цього місяця</div>
        <div class="insight-body">${gone.map(n=>`<strong>${n}</strong>`).join('<br>')}</div>
      </div>`:''}
      <div class="insight-card" style="animation-delay:.4s">
        <div class="insight-icon">✈️</div><div class="insight-title">Сезонний контекст</div>
        <div class="insight-body">
          Поточний індекс: <span class="${sidx>=1.2?'g':sidx<=0.85?'r':'y'}">${sidx.toFixed(2)}x</span><br>
          ${sidx<=0.85?'<span class="y">⚠️ Низький сезон — спад трафіку є нормою. Оцінюй за 🌡️ показником.</span>':''}
          ${sidx>=1.2?'<span class="g">✅ Високий сезон. Порівнюй агентів відносно один одного.</span>':''}
          ${sidx>0.85&&sidx<1.2?'<span>Середній сезон — показники відображають реальну ефективність.</span>':''}<br><br>
          <strong>Динаміка групи по місяцях:</strong><br>
          ${groupTotals.map(g=>`${g.month}: <span>${g.raw.toLocaleString()}</span> · 🌡️<span class="g">${g.norm.toLocaleString()}</span> · ${g.count} аг.`).join('<br>')}
        </div>
      </div>
      ${stable.length?`<div class="insight-card" style="animation-delay:.5s">
        <div class="insight-icon">📊</div><div class="insight-title">Стабільні агенти</div>
        <div class="insight-body">${stable.map(n=>`<strong>${n}</strong>`).join(', ')}<br><br>Показники ±10% з урахуванням сезону.</div>
      </div>`:''}
    </div>`;
}

function renderCompareTab(){
  if(monthNames.length<2){
    document.getElementById('tabContent').innerHTML=`<div style="font-family:var(--font-mono);font-size:.7rem;color:var(--muted);text-align:center;padding:60px">Потрібно мінімум 2 місяці для порівняння</div>`;
    return;
  }
  const m1=monthNames[monthNames.length-2],m2=monthNames[monthNames.length-1];
  const ag1=allSheets[m1]||[],ag2=allSheets[m2]||[];
  const s1=getSeasonIdx(m1),s2=getSeasonIdx(m2);
  const allNames=[...new Set([...ag1.map(a=>a.name),...ag2.map(a=>a.name)])];
  const rows=allNames.map((name,i)=>{
    const a1=ag1.find(a=>a.name===name),a2=ag2.find(a=>a.name===name);
    const t1=a1?.total||0,t2=a2?.total||0;
    const n1=t1/s1,n2=t2/s2,nd=n2-n1;
    const np=n1?((n2-n1)/n1*100).toFixed(0):null;
    const isNew=!a1,isGone=!a2;
    const col=isNew?'var(--green)':isGone?'var(--red)':nd>=0?'var(--green)':'var(--red)';
    return `<div class="compare-card" style="animation-delay:${i*.03}s">
      <div class="rank" style="color:var(--muted)">${i+1}</div>
      <div>
        <div class="agent-name">${name}${isNew?' <span class="tag tag-new">🆕</span>':''}${isGone?' <span class="tag tag-gone">👋</span>':''}</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:4px">
          <span style="font-family:var(--font-mono);font-size:.57rem;color:var(--muted)">${m1}: <span style="color:var(--lavender)">${t1||'—'}</span> <span style="opacity:.5">(🌡️${Math.round(n1)||'—'})</span></span>
          <span style="font-family:var(--font-mono);font-size:.57rem;color:var(--muted)">${m2}: <span style="color:var(--pink)">${t2||'—'}</span> <span style="opacity:.5">(🌡️${Math.round(n2)||'—'})</span></span>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font-mono);font-size:.85rem;font-weight:700;color:${col}">
          ${isNew?'Новий':isGone?'Пішов':(nd>=0?'▲ +':'▼ ')+Math.abs(Math.round(nd))}
        </div>
        ${np&&!isNew&&!isGone?`<div style="font-family:var(--font-mono);font-size:.55rem;color:var(--muted)">${Number(np)>0?'+':''}${np}% ефект.</div>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('tabContent').innerHTML=`
    <div style="font-family:var(--font-mono);font-size:.62rem;color:var(--muted);margin-bottom:18px">
      <span style="color:var(--lavender)">${m1}</span> (сезон ${s1}x) → <span style="color:var(--pink)">${m2}</span> (сезон ${s2}x) · 🌡️ = з урахуванням сезону
    </div>
    <div class="agents-list">${rows}</div>`;
}

function selMonth(m,el){
  currentMonth=m;
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(currentTab==='agents') renderAgentsTab();
  else if(currentTab==='insights') renderInsightsTab();
}

function resort(key,el){
  sortKey=key;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const hist=buildTrends();
  renderList(allSheets[currentMonth]||[],hist,getSeasonIdx(currentMonth));
}

function showLoading(){
  document.getElementById('mainContent').innerHTML=`<div class="loading"><div class="spinner"></div><div class="loading-text">Завантажую дані з Google Sheets...</div></div>`;
}

function showError(){
  document.getElementById('mainContent').innerHTML=`
    <div class="error-box">
      <h3>⚠️ Не вдалося завантажити дані</h3>
      <p>
        Таблиця має бути опублікована через:<br>
        <code>Файл → Опублікувати в інтернеті → Весь документ → Опублікувати</code><br><br>
        Published ID: <code>${PUB_ID.substring(0,20)}...</code>
      </p>
    </div>`;
}

setInterval(loadData,5*60*1000);
loadData();
</script>
